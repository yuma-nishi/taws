services:
  aesm:
    image: sgx_aesm
    devices:
      - "${SGX_ENCLAVE_DEVICE:-/dev/sgx_enclave}:${SGX_ENCLAVE_DEVICE:-/dev/sgx_enclave}"
      - "${SGX_PROVISION_DEVICE:-/dev/sgx_provision}:${SGX_PROVISION_DEVICE:-/dev/sgx_provision}"
    volumes:
      - aesmd-socket:/var/run/aesmd
      - ./scripts/start_aesm.sh:/usr/local/bin/start-aesm:ro
    command: ["bash", "/usr/local/bin/start-aesm"]
    environment:
      - http_proxy
      - https_proxy
      - AESM_PCCS_URL=https://taws:8081/sgx/certification/v4/
    stdin_open: true
    tty: true

  taws:
    image: taws
    depends_on:
      - aesm
    ports:
      - "${TAWS_WEB_PORT:-8181}:8181"
    devices:
      - "${SGX_ENCLAVE_DEVICE:-/dev/sgx_enclave}:${SGX_ENCLAVE_DEVICE:-/dev/sgx_enclave}"
      - "${SGX_PROVISION_DEVICE:-/dev/sgx_provision}:${SGX_PROVISION_DEVICE:-/dev/sgx_provision}"
    volumes:
      - aesmd-socket:/var/run/aesmd
    environment:
      PCCS_API_KEY: "${PCCS_API_KEY:-}"
      PCCS_PROXY: "${PCCS_PROXY:-}"
      PCCS_CACHING_MODE: "${PCCS_CACHING_MODE:-LAZY}"
      PCCS_HOSTS: "0.0.0.0"
      TAWS_WEB_ADDR: "${TAWS_WEB_ADDR:-0.0.0.0:8181}"
      TAWS_TAM_URL: "${TAWS_TAM_URL:-http://127.0.0.1:8080/tam}"

volumes:
  aesmd-socket:
    external: true
